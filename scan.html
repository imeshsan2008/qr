<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VenomQR Inline Preview Scanner</title>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --primary:#e63946; --glass-bg:rgba(20,30,40,0.55); --glass-border:rgba(255,255,255,0.15); --glass-shadow:0 20px 40px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.05) inset; --light-text:#f0f3f8;}
body { background: radial-gradient(circle at 30% 10%, #1a252f, #030405); font-family:'Segoe UI',system-ui,-apple-system,sans-serif; min-height:100vh; padding:20px; color:var(--light-text);}
.qr-wrapper { background: var(--glass-bg); backdrop-filter: blur(18px) saturate(180%); border:1px solid var(--glass-border); box-shadow: var(--glass-shadow); border-radius:42px; padding:30px 28px; margin:0 auto; max-width:480px;}
.qr-title { font-weight:700; letter-spacing:-0.5px; font-size:2rem; text-shadow:0 2px 10px rgba(230,57,70,0.3); display:flex; align-items:center; justify-content:center; text-align:center; margin-bottom:20px; gap:10px;}
.qr-title i { color: var(--primary); font-size:2rem; }
#reader { width:100%; border-radius:28px; overflow:hidden; box-shadow:0 10px 20px rgba(0,0,0,0.5); }
#result { margin-top:20px; font-size:1rem; color:#f0f3f8; background: rgba(0,0,0,0.4); padding:10px 14px; border-radius:20px; word-break: break-all; text-align:center; }
.btn-main { background: rgba(230,57,70,0.75); backdrop-filter: blur(10px); border:1px solid rgba(255,255,255,0.3); color:white; padding:14px 22px; border-radius:40px; font-weight:700; width:100%; margin-top:20px; transition:0.25s; box-shadow:0 10px 20px -8px rgba(230,57,70,0.4); letter-spacing:0.3px; cursor:pointer; }
.btn-main:hover { background:#e63946; border-color:#fff; transform:scale(1.02); box-shadow:0 18px 30px -5px #e63946; }
.preview-grid { display:flex; flex-wrap:wrap; gap:15px; margin-top:20px; justify-content:center; }
.preview-card { background: rgba(10,15,20,0.6); backdrop-filter: blur(12px); border:1px solid rgba(255,255,255,0.15); border-radius:28px; padding:15px; width:200px; text-align:center; box-shadow:0 10px 20px rgba(0,0,0,0.5); transition:0.2s; position:relative; }
.preview-card:hover { border-color: var(--primary); transform: translateY(-4px);}
.preview-card img, .preview-card video, .preview-card iframe { width:100%; height:150px; object-fit:cover; border-radius:18px; background:#1e1e2a; margin-bottom:8px;}
.preview-card .file-name { font-size:0.8rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
</style>
</head>
<body>

<div class="qr-wrapper">
    <div class="qr-title"><i class="fas fa-qrcode"></i> VenomQR Inline Scanner</div>
    <div id="reader"></div>
    <div id="result">Scan a QR code to see the result here.</div>
    <button class="btn-main" onclick="startScanner()">Start Scanner</button>
    <div class="preview-grid" id="preview-grid"></div>
</div>

<script>
let html5QrcodeScanner;

function startScanner(){
    html5QrcodeScanner = new Html5Qrcode("reader");
    html5QrcodeScanner.start(
        { facingMode:"environment" },
        { fps:10, qrbox:250 },
        onScanSuccess,
        onScanFailure
    ).catch(err=>console.error(err));
}

function detectType(url){
    url = url.toLowerCase();
    if(url.includes("drive.google.com")) return "drive";
    if(url.match(/\.(jpg|jpeg|png|gif|bmp|webp)$/)) return "image";
    if(url.match(/\.(mp4|mov|avi|webm|mkv)$/)) return "video";
    if(url.match(/\.(pdf)$/)) return "pdf";
    if(url.match(/\.(doc|docx)$/)) return "doc";
    if(url.match(/\.(xls|xlsx)$/)) return "sheet";
    if(url.match(/\.(ppt|pptx)$/)) return "slide";
    return "link";
}

function getDrivePreview(url){
    let match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
    if(!match) return url;
    return `https://drive.google.com/uc?export=view&id=${match[1]}`;
}

function onScanSuccess(decodedText){
    document.getElementById('result').innerText = `Scanned: ${decodedText}`;
    let grid = document.getElementById('preview-grid');
    let type = detectType(decodedText);
    let card = document.createElement('div');
    card.className = 'preview-card';
    let previewUrl = decodedText;

    if(type==="drive") previewUrl = getDrivePreview(decodedText);

    // Embed inside card
    if(type==="image" || (type==="drive" && decodedText.match(/\.(jpg|jpeg|png|gif|bmp|webp)$/i))){
        let img = document.createElement('img'); img.src = previewUrl; card.appendChild(img);

        
    } else if(type==="video" || (type==="drive" && decodedText.match(/\.(mp4|mov|avi|webm|mkv)$/i))){
        let vid = document.createElement('video'); vid.src = previewUrl; vid.controls=true; vid.autoplay=false; card.appendChild(vid);
    } else if(type==="pdf"){
        let iframe = document.createElement('iframe'); iframe.src = previewUrl; iframe.style.height="200px"; iframe.style.width="100%"; card.appendChild(iframe);
    } else if(type==="doc" || type==="sheet" || type==="slide"){
        let iframe = document.createElement('iframe'); iframe.src = previewUrl; iframe.style.height="200px"; iframe.style.width="100%"; card.appendChild(iframe);
    } else {
        let link = document.createElement('a'); link.href = previewUrl; link.target="_blank"; link.innerText="Open File"; card.appendChild(link);
    }

    let fname = document.createElement('div'); fname.className='file-name';
    fname.innerText = decodedText.split('/').pop(); card.appendChild(fname);

    grid.appendChild(card);

    if(html5QrcodeScanner) html5QrcodeScanner.clear();
}

function onScanFailure(error){ /* optional */ }
</script>

</body>
</html>
