<html lang="en">

<head>

    <meta http-equiv="Cross-Origin-Embedder-Policy" content="unsafe-none">

    <!-- Bootstrap + AOS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Font Awesome 6 (free) for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #e63946;
            --glass-bg: rgba(20, 30, 40, 0.55);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
            --dark-bg: #0a0c0f;
            --light-text: #f0f3f8;
        }

        body {
            background: radial-gradient(circle at 30% 10%, #1a252f, #030405);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        /* 🧊 Liquid Glass wrapper */
        .qr-wrapper {
            background: var(--glass-bg);
            backdrop-filter: blur(18px) saturate(180%);
            -webkit-backdrop-filter: blur(18px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 42px;
            padding: 30px 28px;
            transition: all 0.3s ease;
            color: var(--light-text);
        }

        .qr-title {
            font-weight: 700;
            letter-spacing: -0.5px;
            font-size: 2.2rem;
            text-shadow: 0 2px 10px rgba(230, 57, 70, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin: 0 auto;
            gap: 10px;
            padding-bottom: 16px;
        }

        .qr-title i {
            color: var(--primary);
            font-size: 2rem;
        }
/* Responsive adjustments */
@media (max-width: 600px) {
    .qr-title {
        font-size: 1.2rem; /* smaller font on mobile */
    }
    
}
        /* glass tabs */
        .nav-tabs {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-tabs .nav-link {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px !important;
            color: #ccc;
            font-weight: 600;
            padding: 10px 24px;
            margin-right: 6px;
            backdrop-filter: blur(8px);
            transition: 0.2s;
        }

        .nav-tabs .nav-link.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 8px 20px rgba(230, 57, 70, 0.4);
        }

        /* glass inputs */
        .form-control,
        .form-control:focus {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 18px;
            color: white;
            padding: 12px 18px;
            box-shadow: none;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-control:focus {
            border-color: var(--primary);
            background: rgba(20, 20, 30, 0.7);
        }

        .input-label {
            font-weight: 500;
            margin-bottom: 8px;
            margin-left: 8px;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Liquid glass button */
        .btn-main {
            background: rgba(230, 57, 70, 0.75);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 14px 22px;
            border-radius: 40px;
            font-weight: 700;
            width: 100%;
            transition: 0.25s;
            box-shadow: 0 10px 20px -8px rgba(230, 57, 70, 0.4);
            letter-spacing: 0.3px;
        }

        .btn-main:hover {
            background: #e63946;
            border-color: #fff;
            transform: scale(1.02);
            box-shadow: 0 18px 30px -5px #e63946;
        }

        /* progress bar glass style */
        .progress {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 30px;
            height: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .progress-bar {
            background: var(--primary);
            border-radius: 30px;
            box-shadow: 0 0 10px #e63946;
        }

        /* file preview cards */
        .preview-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }

        .preview-card {
            background: rgba(10, 15, 20, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            padding: 15px;
            width: 170px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            transition: 0.2s;
            position: relative;
        }

        .preview-card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
        }

        .preview-card img,
        .preview-card video,
        .preview-card iframe {
            width: 100%;
            height: 110px;
            object-fit: cover;
            border-radius: 18px;
            background: #1e1e2a;
        }

        .preview-card .file-name {
            font-size: 0.8rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin: 8px 0 4px;
        }

        .remove-preview {
            position: absolute;
            top: 6px;
            right: 8px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            border: 1px solid white;
            cursor: pointer;
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .remove-preview:hover {
            background: var(--primary);
        }

        /* GDrive section */
        .drive-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            padding: 20px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .loading-spinner {
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            width: 60px;
            height: 60px;
            margin: 20px auto;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.5);
        }

        #qr-output img,
        #drive-qr-output img {
            border-radius: 28px;
            box-shadow: 0 20px 40px black;
            background: white;
            padding: 10px;
            margin-top: 20px;
            width: 100%;
            max-width: 400px;
        }

        .badge-success {
            background: rgba(40, 167, 69, 0.3);
            border: 1px solid #28a745;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 0.8rem;
        }

        .btn-gen:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ── FIXED: main layout ── */
        .main-container {
            display: flex;
            flex-wrap: wrap;
            /* wraps on smaller screens */
            gap: 20px;
            align-items: flex-start;
            justify-content: center;
        }

        /* QR generator takes available space, min 340px */
        .qr-wrapper.qr-main {
            flex: 1 1 340px;
            max-width: 780px;
            min-width: 300px;
            margin: 0;
        }

        /* History panel fixed width, shrinks to full-width on wrap */
        .qr-wrapper.qr-history {
            flex: 0 1 340px;
            min-width: 280px;
            max-height: 500px;
            overflow-y: auto;

            margin: 0;
        }

/* Scrollbar styling */
.qr-wrapper.qr-history::-webkit-scrollbar {
    width: 5px;
}

.qr-wrapper.qr-history::-webkit-scrollbar-track {
    background: rgba(209, 0, 17, 0.2);
    border-radius: 50px;
}

.qr-wrapper.qr-history::-webkit-scrollbar-thumb {
    background: rgba(209, 0, 17, 0.7);
    border-radius: 50px;
}
        /* History list items */
        #qr-history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 10px 14px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .history-item:hover {
            background: rgba(230, 57, 70, 0.08);
            border-color: rgba(230, 57, 70, 0.4);
        }

        .history-thumb {
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 12px;
            padding: 3px;
            overflow: hidden;
        }

        .history-thumb img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .history-meta {
            flex: 1;
            overflow: hidden;
        }

        .history-meta .h-label {
            font-size: 0.82rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-meta .h-date {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 2px;
        }

        .history-empty {
            text-align: center;
            padding: 30px 10px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.85rem;
        }

        .history-empty i {
            font-size: 2rem;
            display: block;
            margin-bottom: 10px;
        }

        /* history section label */
        .history-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 4px;
            color: rgba(255, 255, 255, 0.85);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-title i {
            color: var(--primary);
        }
    </style>
</head>

<body>

    <!-- GDrive OAuth client-side library -->
    <script src="https://accounts.google.com/gsi/client"></script>
    <script>/**********************************************
 *  GLOBAL STATE & CONFIG (CLIENT-SIDE OAUTH)
 **********************************************/
const CLIENT_ID = '683648057850-hpoedkcjkaf1pma67dstcorgrield10v.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email openid';

let accessToken = null;
let driveFolderId = null;
let uploadedDriveFiles = [];

// DOM elements
const driveStatus = document.getElementById('drive-status');
const fileUploader = document.getElementById('file-uploader');
const previewContainer = document.getElementById('preview-container');
const progressContainer = document.getElementById('upload-progress-container');
const driveQrOutput = document.getElementById('drive-qr-output');
const generateDriveBtn = document.getElementById('generate-drive-qr-btn');
const uploadHelp = document.getElementById('upload-help');

// ─────────────────────────────────────────────
//  UTILITIES
// ─────────────────────────────────────────────
function isObject(item) {
    return item && typeof item === 'object' && !Array.isArray(item);
}

async function safeFetch(url, options = {}) {
    const res = await fetch(url, options);
    if (!res.ok) {
        const text = await res.text();
        throw new Error(`HTTP Error ${res.status}: ${text}`);
    }
    return res;
}

function generateId() {
    return 'img_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8);
}

// ─────────────────────────────────────────────
//  AUTH
// ─────────────────────────────────────────────
async function getUserInfo(token) {
    const tokenInfoRes = await fetch(`https://oauth2.googleapis.com/tokeninfo?access_token=${token}`);
    const tokenInfo = await tokenInfoRes.json();
    if (!tokenInfoRes.ok) throw new Error(`Token invalid: ${tokenInfo.error_description || tokenInfo.error}`);

    const userInfoRes = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
        headers: { Authorization: `Bearer ${token}` }
    });
    if (!userInfoRes.ok) throw new Error(`UserInfo failed (${userInfoRes.status})`);
    return userInfoRes.json();
}

async function handleDriveLogin() {
    driveStatus.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Connecting...`;

    const client = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: async (response) => {
            if (response.access_token) {
                accessToken = response.access_token;
                sessionStorage.setItem('driveAccessToken', accessToken);
                await updateUI();
                await createDriveFolder();
            } else {
                driveStatus.innerHTML = `<i class="fas fa-exclamation-triangle text-warning"></i> Auth failed: ${response.error || 'unknown error'}`;
            }
        },
        error_callback: (error) => {
            driveStatus.innerHTML = `<i class="fas fa-exclamation-triangle text-warning"></i> Auth error: ${error.type}`;
            console.error('Auth error:', error);
        }
    });

    client.requestAccessToken();
}

function handleDriveLogout() {
    sessionStorage.removeItem('driveAccessToken');
    sessionStorage.removeItem('driveFolderId');
    accessToken = null;
    driveFolderId = null;
    uploadedDriveFiles = [];
    updateUI();
}

// ─────────────────────────────────────────────
//  UI STATE
// ─────────────────────────────────────────────
async function updateUI() {
    const savedToken = sessionStorage.getItem('driveAccessToken');
    const savedFolderId = sessionStorage.getItem('driveFolderId');
    accessToken = savedToken || null;
    driveFolderId = savedFolderId || null;

    if (savedToken) {
        try {
            const userInfo = await getUserInfo(savedToken);

            document.getElementById('gdrive-signin-btn').style.display = 'none';
            document.getElementById('gdrive-signout-btn').style.display = 'block';
            document.getElementById('user-info').style.display = 'block';
            document.getElementById('user-name').textContent = `Logged in as: ${userInfo.name}`;
            if (userInfo.picture) document.getElementById('profile-photo').src = userInfo.picture;

            if (fileUploader) fileUploader.disabled = false;
            if (uploadHelp) uploadHelp.textContent = '✅ Ready to upload files';
            if (driveStatus) driveStatus.innerHTML = `<i class="fas fa-check-circle text-success"></i> Connected`;

            await renderHistory();
        } catch (err) {
            console.error('Invalid/expired token:', err);
            sessionStorage.removeItem('driveAccessToken');
            sessionStorage.removeItem('driveFolderId');
            accessToken = null;
            driveFolderId = null;
            updateUI();
        }
    } else {
        document.getElementById('user-info').style.display = 'none';
        document.getElementById('gdrive-signin-btn').style.display = 'block';
        document.getElementById('gdrive-signout-btn').style.display = 'none';
        if (fileUploader) fileUploader.disabled = true;
        if (uploadHelp) uploadHelp.textContent = '🔑 Please sign in to upload files';
        if (driveStatus) driveStatus.innerHTML = '';
    }
}

// ─────────────────────────────────────────────
//  DRIVE FOLDER
// ─────────────────────────────────────────────
async function createDriveFolder() {
    if (!accessToken) return;

    // Restore from session first
    const saved = sessionStorage.getItem('driveFolderId');
    if (saved) {
        driveFolderId = saved;
        if (driveStatus) driveStatus.innerHTML += `<br><span class="badge-success"><i class="fas fa-folder"></i> Drive folder ready</span>`;
        return;
    }

    try {
        const searchRes = await fetch(
            `https://www.googleapis.com/drive/v3/files?q=name='VenomQR_uploads' and mimeType='application/vnd.google-apps.folder' and trashed=false&fields=files(id,name)`,
            { headers: { Authorization: `Bearer ${accessToken}` } }
        );
        if (!searchRes.ok) throw new Error(`Search failed: ${searchRes.status}`);
        const searchData = await searchRes.json();

        if (searchData.files && searchData.files.length > 0) {
            driveFolderId = searchData.files[0].id;
        } else {
            const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
                method: 'POST',
                headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: 'VenomQR_uploads', mimeType: 'application/vnd.google-apps.folder' })
            });
            if (!createRes.ok) throw new Error(`Folder creation failed: ${createRes.status}`);
            const folder = await createRes.json();
            driveFolderId = folder.id;
        }

        sessionStorage.setItem('driveFolderId', driveFolderId);
        if (driveStatus) driveStatus.innerHTML += `<br><span class="badge-success"><i class="fas fa-folder"></i> Drive folder ready</span>`;
    } catch (error) {
        if (driveStatus) driveStatus.innerHTML += `<br><span class="text-danger"><i class="fas fa-exclamation-circle"></i> Folder error: ${error.message}</span>`;
        console.error('Drive folder error:', error);
    }
}

// ─────────────────────────────────────────────
//  FILE UPLOAD + PREVIEW
// ─────────────────────────────────────────────
fileUploader.addEventListener('change', async function (e) {
    const files = Array.from(e.target.files);
    for (const file of files) {
        addPreview(file);
        await uploadFileToDrive(file, false);
    }
    // Reset input so same file can be re-selected
    e.target.value = '';
});

function addPreview(file) {
    const reader = new FileReader();
    const card = document.createElement('div');
    card.className = 'preview-card';
    card.setAttribute('data-filename', file.name);

    const safeName = file.name.replace(/'/g, "\\'");
    const removeBtn = `<div class="remove-preview" onclick="removePreviewCard('${safeName}')"><i class="fas fa-times"></i></div>`;

    if (file.type.startsWith('image/')) {
        reader.onload = (e) => {
            card.innerHTML = `<img src="${e.target.result}" alt="preview"><div class="file-name">${file.name}</div>${removeBtn}`;
        };
        reader.readAsDataURL(file);
    } else if (file.type.startsWith('video/')) {
        reader.onload = (e) => {
            card.innerHTML = `<video src="${e.target.result}" controls></video><div class="file-name">${file.name}</div>${removeBtn}`;
        };
        reader.readAsDataURL(file);
    } else if (file.type === 'application/pdf') {
        reader.onload = (e) => {
            card.innerHTML = `<iframe src="${e.target.result}" style="background:white;"></iframe><div class="file-name">${file.name}</div>${removeBtn}`;
        };
        reader.readAsDataURL(file);
    } else {

/**
 * Upload a file to Google Drive.
 * @param {File} file
 * @param {boolean} isQR  - true = silent upload (QR PNG), false = show progress UI
 * @returns {Promise<object>} Drive file detail
 */
function uploadFileToDrive(file, isQR = false) {
    return new Promise((resolve, reject) => {
        if (!accessToken || !driveFolderId) {
            alert('Drive not properly connected. Please reconnect.');
            return reject(new Error('Drive not connected'));
        }

        let progressDiv = null;
        let progBar = null;

        if (!isQR) {
            const progressId = 'progress-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
            progressDiv = document.createElement('div');
            progressDiv.className = 'mb-2';
            progressDiv.id = progressId;
            progressDiv.innerHTML = `
                <div class="small">${file.name}</div>
                <div class="progress">
                    <div class="progress-bar" role="progressbar" style="width:0%"></div>
                </div>`;
            progressContainer.appendChild(progressDiv);
            progBar = progressDiv.querySelector('.progress-bar');
        }

        const metadata = { name: file.name, parents: [driveFolderId] };
        const formData = new FormData();
        formData.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        formData.append('file', file);

        const xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart');
        xhr.setRequestHeader('Authorization', `Bearer ${accessToken}`);

        xhr.upload.addEventListener('progress', (e) => {
            if (e.lengthComputable && progBar) {
                const pct = Math.round((e.loaded / e.total) * 100);
                progBar.style.width = pct + '%';
                progBar.textContent = pct + '%';
            }
        });

        xhr.onload = function () {
            if (xhr.status >= 200 && xhr.status < 300) {
                const fileData = JSON.parse(xhr.responseText);

                // Fetch full detail then make it publicly readable
                fetch(`https://www.googleapis.com/drive/v3/files/${fileData.id}?fields=id,name,webViewLink,mimeType`, {
                    headers: { Authorization: `Bearer ${accessToken}` }
                })
                    .then(r => r.json())
                    .then(detail => {
                        return fetch(`https://www.googleapis.com/drive/v3/files/${fileData.id}/permissions`, {
                            method: 'POST',
                            headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ role: 'reader', type: 'anyone' })
                        }).then(() => detail);
                    })
                    .then(async (detail) => {
                        const fileEntry = {
                            name: detail.name,
                            id: detail.id,
                            webViewLink: detail.webViewLink || `https://drive.google.com/file/d/${detail.id}/view`,
                            mimeType: detail.mimeType
                        };

                        if (!isQR) {
                            // Add to list and enable Generate QR button
                            uploadedDriveFiles.push(fileEntry);
                            if (progressDiv) progressDiv.innerHTML += `<div class="small text-success mt-1">✅ Uploaded to Drive</div>`;
                            if (generateDriveBtn) generateDriveBtn.disabled = false;
                        } else {
                            // QR PNG uploaded — show success
                            Swal.fire({
                                title: 'Uploaded!',
                                html: `QR Code uploaded! <br><a href="${detail.webViewLink}" target="_blank">View QR Code</a>`,
                                icon: 'success',
                                timer: 2000,
                                showConfirmButton: false
                            });
                        }

                        resolve(fileEntry);
                    })
                    .catch(err => {
                        if (!isQR && progressDiv) progressDiv.innerHTML += `<div class="small text-danger">⚠️ Uploaded but failed to get link</div>`;
                        reject(err);
                    });
            } else {
                let msg = 'Upload failed';
                try { msg = JSON.parse(xhr.responseText).error.message || msg; } catch (_) {}
                if (!isQR && progressDiv) progressDiv.innerHTML += `<div class="small text-danger">❌ ${msg}</div>`;
                reject(new Error(msg));
            }
        };

        xhr.onerror = function () {
            if (!isQR && progressDiv) progressDiv.innerHTML += `<div class="small text-danger">❌ Network error</div>`;
            reject(new Error('Network error'));
        };

        xhr.send(formData);
    });
}

//  JSON DATA FILE (data.json in Drive folder)
// ─────────────────────────────────────────────
function appendData(existingData, newImage) {
    if (!existingData || typeof existingData !== 'object') existingData = {};
    if (!Array.isArray(existingData.images)) existingData.images = [];

    // Guard against accidentally nesting
    if (newImage.images) {
        console.warn('Wrong data format detected, fixing...');
        newImage = newImage.images[0];
    }

    existingData.images.push({
        id: newImage.id || generateId(),
        caption: newImage.caption || '',
        qrURL: newImage.qrURL || '',
        fileId: newImage.fileId || '',
        fileName: newImage.fileName || '',
        fileURL: newImage.fileURL || '',
        created: new Date().toDateString()
    });

    return existingData;
}

async function upsertJsonFile(folderId, fileName, data = {}) {
    const token = sessionStorage.getItem('driveAccessToken');
    if (!token) throw new Error('No Drive access token found');
    if (!isObject(data)) throw new Error('Data must be a valid object');

    const query = `'${folderId}' in parents and name='${fileName}' and mimeType='application/json' and trashed=false`;
    const findResponse = await safeFetch(
        `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&fields=files(id,name)`,
        { headers: { Authorization: `Bearer ${token}` } }
    );
    const findData = await findResponse.json();

    if (findData.files && findData.files.length > 0) {
        const fileId = findData.files[0].id;
        let currentData = {};
        try {
            const getResponse = await safeFetch(
                `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
                { headers: { Authorization: `Bearer ${token}` } }
            );
            const text = await getResponse.text();
            currentData = text ? JSON.parse(text) : {};
        } catch (_) {
            currentData = {};
        }

        const updatedData = appendData(currentData, data);
        const updateResponse = await safeFetch(
            `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,
            {
                method: 'PATCH',
                headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(updatedData, null, 2)
            }
        );
        return updateResponse.json();
    } else {
        const metadata = { name: fileName, mimeType: 'application/json', parents: [folderId] };
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
        form.append('file', new Blob([JSON.stringify(appendData({}, data), null, 2)], { type: 'application/json' }));

        const createResponse = await safeFetch(
            'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name',
            { method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: form }
        );
        return createResponse.json();
    }
}

async function getJsonFile(folderId, fileName) {
    const token = sessionStorage.getItem('driveAccessToken');
    if (!token) return { images: [] }; // Not logged in — return empty gracefully

    try {
        const query = `'${folderId}' in parents and name='${fileName}' and mimeType='application/json' and trashed=false`;
        const findResponse = await fetch(
            `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&fields=files(id,name)`,
            { headers: { Authorization: `Bearer ${token}` } }
        );
        const findData = await findResponse.json();

        if (!findData.files || findData.files.length === 0) return { images: [] }; // No file yet

        const fileId = findData.files[0].id;
        const contentResponse = await fetch(
            `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
            { headers: { Authorization: `Bearer ${token}` } }
        );
        const text = await contentResponse.text();
        const parsed = text ? JSON.parse(text) : {};
        if (!Array.isArray(parsed.images)) parsed.images = [];
        return parsed;
    } catch (err) {
        console.error('getJsonFile error:', err);
        return { images: [] };
    }
}

// Single source of truth — never push to this from outside renderHistory
let currentHistoryImages = [];
async function renderHistory() {
    const folderId = sessionStorage.getItem('driveFolderId');
    if (!folderId) return;

    const data = await getJsonFile(folderId, 'data.json');
    currentHistoryImages = Array.isArray(data.images) ? data.images : [];

    const list = document.getElementById('qr-history-list');
    if (!list) return;

    if (!currentHistoryImages.length) {
        list.innerHTML = '<p class="text-muted small">No history yet.</p>';
        return;
    }

   list.innerHTML = [...currentHistoryImages]
    .sort((a, b) => new Date(b.created) - new Date(a.created)) // newest first
    .map((item, i) => `
        <div class="history-item" id="history-${i}"  onclick="previewQR(${i})">
            <div class="history-thumb" style="cursor:pointer;">
                <img src="${item.qrURL}" alt="QR thumbnail">
            </div>
            <div class="history-meta">
                <div class="h-label">${item.caption || '(no caption)'}</div>
                <div class="h-date"><i class="fas fa-clock" style="font-size:.6rem;"></i> ${item.created}</div>
                <button class="btn btn-sm btn-danger" onclick="event.stopPropagation(); deleteHistoryItem(${i})" style="margin-top:5px;">Delete</button>
            </div>
        </div>
    `).join('');
}

async function deleteHistoryItem(index) {
    if (!currentHistoryImages[index]) return;

    // Step 1: Show confirmation alert
    const result = await Swal.fire({
        title: 'Are you sure?',
        text: 'Do you really want to delete this item? This action cannot be undone.',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Yes, delete it!',
        cancelButtonText: 'Cancel',
    });

    if (!result.isConfirmed) return; // User canceled deletion

    // Step 2: Remove from local array
    currentHistoryImages.splice(index, 1);

    // Step 3: Show deleting/loading alert
    Swal.fire({
        title: 'Deleting...',
        text: 'Please wait...',
        icon: 'info',
        showCancelButton: false,
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading()
    });

    try {
        const folderId = sessionStorage.getItem('driveFolderId');
        const token = sessionStorage.getItem('driveAccessToken');
        if (!folderId || !token) throw new Error('Missing Drive info');

        const query = `'${folderId}' in parents and name='data.json' and mimeType='application/json' and trashed=false`;
        const fileRes = await fetch(
            `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(query)}&fields=files(id,name)`,
            { headers: { Authorization: `Bearer ${token}` } }
        );
        const fileData = await fileRes.json();
        const fileId = fileData.files && fileData.files[0] ? fileData.files[0].id : null;
        if (!fileId) throw new Error('data.json not found on Drive');

        await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
            method: 'PATCH',
            headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ images: currentHistoryImages })
        });

        Swal.close();
        await renderHistory();
    } catch (err) {
        Swal.close();
        console.error('Failed to update Drive after delete:', err);
        Swal.fire({ title: 'Error', text: 'Failed to delete item from Drive.', icon: 'error' });
    }
}

function previewQR(i) {
    const item = currentHistoryImages[i];
    if (!item) return;

    Swal.fire({
    html: `
      <p><small>Caption:</small> ${item.caption || '(no caption)'}</p>
      <p><small>Created:</small> ${item.created}</p>

      ${item.fileURL ? `
        <p>
          <small>File:</small> 
          <a href="${item.fileURL}" target="_blank">${item.fileURL}</a>
        </p>
        <p>
          <small>Extension:</small> 
          ${item.fileName 
            ? item.fileName.split('.').pop().toLowerCase() 
            : 'unknown'}
        </p>
      ` : ''}
    `,

    imageUrl: item.qrURL,
    imageWidth: 220,
    background: '#1a2530',
    color: '#fff',
    confirmButtonColor: '#e63946',
    confirmButtonText: 'Close',
    showCancelButton: true,
    cancelButtonText: 'Download QR Code',
    cancelButtonColor: '#333'
}).then(async (r) => {
    if (r.isDismissed && r.dismiss === Swal.DismissReason.cancel) {
        try {
            const response = await fetch(item.qrURL, { mode: 'cors' });
            const blob = await response.blob();
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = (item.caption || 'qr') + '_qr.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            URL.revokeObjectURL(url);
        } catch (err) {
            console.error('Download failed', err);
            alert('Failed to download image.');
        }
    }
});
}

async function generateDriveFileQR() {
    if (!uploadedDriveFiles.length) {
        alert('No files uploaded yet.');
        return;
    }

    const caption = document.getElementById('caption').value.trim();
    const linksString = uploadedDriveFiles.map(f => f.webViewLink).join('\n');
    const qrSize = 450;
    const qrUrl = `https://quickchart.io/qr?ecLevel=Q&text=${encodeURIComponent(linksString)}&caption=${encodeURIComponent(caption)}&captionFontSize=18&size=${qrSize}`;

    driveQrOutput.innerHTML = '';
    driveQrOutput.style.display = 'flex';
    driveQrOutput.style.flexDirection = 'column';
    driveQrOutput.style.alignItems = 'center';
    driveQrOutput.style.gap = '20px';

    const img = new Image();
    img.src = qrUrl;
    img.alt = 'QR code for Drive files';
    img.style.maxWidth = '300px';
    img.classList.add('img-fluid');

    img.onload = async () => {
        driveQrOutput.appendChild(img);

        // Save to data.json
        if (accessToken && driveFolderId) {
            try {
                const newRecord = {
                    caption,
                    qrURL: qrUrl,
                    fileId: uploadedDriveFiles.map(f => f.id).join(','),
                    fileName: uploadedDriveFiles.map(f => f.name).join(', '),
                    fileURL: uploadedDriveFiles.map(f => f.webViewLink).join('\n')
                };
                await upsertJsonFile(driveFolderId, 'data.json', newRecord);
                await renderHistory();
            } catch (err) {
                console.error('Failed to save QR record:', err);
            }
        }

        // Download button
        const downloadBtn = document.createElement('button');
        downloadBtn.className = 'btn btn-danger';
        downloadBtn.innerHTML = '<i class="fas fa-download"></i> Download QR';
        downloadBtn.addEventListener('click', async () => {
            const blob = await (await fetch(qrUrl)).blob();
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = (caption || 'drive') + '_qr.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });
        driveQrOutput.appendChild(downloadBtn);

        const summary = document.createElement('div');
        summary.className = 'small text-white-50';
        summary.textContent = `QR contains ${uploadedDriveFiles.length} file link(s)`;
        driveQrOutput.appendChild(summary);
    };

    img.onerror = () => {
        driveQrOutput.innerHTML = "<p style='color:red;'>Failed to generate QR.</p>";
    };
}
